name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build template
        run: npm run build

      - name: Typecheck project
        run: node ./node_modules/typescript/lib/tsc.js --noEmit

      - name: Package Worker with Wrangler dry-run
        run: node ./node_modules/wrangler/bin/wrangler.js deploy --dry-run
